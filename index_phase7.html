      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;

// ═══════════════════════════════════════════════
// 캔버스 & 파생 상수
// ═══════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CONFIG.width;
canvas.height = CONFIG.height;

const PLAYER_X = Math.floor(CONFIG.width  * CONFIG.playerXRatio);
const FRAME_MS = 1000 / 60;

// ═══════════════════════════════════════════════
// Web Audio — 효과음 (외부 라이브러리 없이 오실레이터로 생성)
// ═══════════════════════════════════════════════
let audioCtx = null;

// ── 배경음악 ──
const bgm = new Audio('MUSIC/쿠키런_bgm1.mp3');
bgm.loop   = true;
bgm.volume = 0.45;

function startBGM() {
  bgm.currentTime = 0;
  bgm.play().catch(() => {});  // 브라우저 자동재생 정책 대비
}
function stopBGM() {
  bgm.pause();
  bgm.currentTime = 0;
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function scheduleTone(ac, freq, type, startTime, duration, peakGain) {
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(peakGain, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.01);
}

function playJellySound() {
  const ac  = getAudioCtx();
  const now = ac.currentTime;
  // 밝은 상행 두 음 "딩↑딩↑"
  scheduleTone(ac, 880,  'sine', now,        0.12, 0.28);
  scheduleTone(ac, 1320, 'sine', now + 0.07, 0.10, 0.22);
}

function playCoinSound() {
  const ac  = getAudioCtx();
  const now = ac.currentTime;
  // 금속성 짧은 두 음 "챙↑"
  scheduleTone(ac, 660, 'triangle', now,        0.14, 0.32);
  scheduleTone(ac, 990, 'triangle', now + 0.05, 0.10, 0.24);
}

function playPowerupSound() {
  const ac  = getAudioCtx();
  const now = ac.currentTime;
  // 4음 상행 팡파레 "두두두두↑"
  [523, 659, 784, 1047].forEach((freq, i) => {
    scheduleTone(ac, freq, 'square', now + i * 0.09, 0.22, 0.30);
  });
  // 끝에 긴 여운음
  scheduleTone(ac, 1047, 'sine', now + 0.36, 0.40, 0.18);
}

// ═══════════════════════════════════════════════
// 스프라이트 이미지 — 달리기(0) / 점프(1) / 슬라이드(2) 세 포즈
// ═══════════════════════════════════════════════
// 배경 이미지
const bgImg = new Image();
bgImg.src = 'image/배경화면6.png';
let bgImgLoaded = false;
let bgImgDrawW  = 0;
let bgTileCanvas = null; // createPattern 대신 직접 drawImage 방식으로 이음새 제거

bgImg.onload = () => {
  bgImgDrawW = Math.round(bgImg.naturalWidth * (CONFIG.height / bgImg.naturalHeight));
  const H    = CONFIG.height;
  const fadeW = Math.floor(bgImgDrawW * 0.30); // 30% 크로스페이드 구간 (넓을수록 자연스러움)

  // ① 메인 타일 캔버스
  const oc  = document.createElement('canvas');
  oc.width  = bgImgDrawW;
  oc.height = H;
  const oc2d = oc.getContext('2d');
  oc2d.drawImage(bgImg, 0, 0, bgImgDrawW, H);

  // ② 좌측 fadeW 픽셀을 별도 캔버스에 그리고 알파 그라디언트 마스크 적용
  //    (좌=투명 → 우=불투명) → 타일 우측에 겹쳐 크로스페이드
  const srcFadeW = fadeW * (bgImg.naturalWidth / bgImgDrawW);
  const tc  = document.createElement('canvas');
  tc.width  = fadeW;
  tc.height = H;
  const tc2d = tc.getContext('2d');
  tc2d.drawImage(bgImg, 0, 0, srcFadeW, bgImg.naturalHeight, 0, 0, fadeW, H);
  tc2d.globalCompositeOperation = 'destination-in';
  const mask = tc2d.createLinearGradient(0, 0, fadeW, 0);
  mask.addColorStop(0,   'rgba(0,0,0,0)');
  mask.addColorStop(0.3, 'rgba(0,0,0,0.05)');
  mask.addColorStop(0.7, 'rgba(0,0,0,0.5)');
  mask.addColorStop(1,   'rgba(0,0,0,1)');
  tc2d.fillStyle = mask;
  tc2d.fillRect(0, 0, fadeW, H);

  // ③ 블렌드 스트립을 메인 타일 우측에 합성
  oc2d.drawImage(tc, bgImgDrawW - fadeW, 0);

  bgTileCanvas = oc;
  bgImgLoaded  = true;
};

const lizardImg = new Image();
lizardImg.src = 'image/도마뱀2.png';
let lizardLoaded = false;
let lizardCanvas = null;   // 배경 제거된 오프스크린 캔버스

lizardImg.onload = () => {
  const oc   = document.createElement('canvas');
  oc.width   = lizardImg.naturalWidth;
  oc.height  = lizardImg.naturalHeight;
  const oc2d = oc.getContext('2d');
  oc2d.drawImage(lizardImg, 0, 0);

  const imgData = oc2d.getImageData(0, 0, oc.width, oc.height);
  const d = imgData.data;

  // 좌상단 코너가 불투명이면 그 색을 배경으로 간주해 제거
  if (d[3] > 0) {
    const bgR = d[0], bgG = d[1], bgB = d[2];
    const thr = 40;   // 허용 오차 (안티앨리어싱 경계 포함)
    for (let i = 0; i < d.length; i += 4) {
      if (Math.abs(d[i]   - bgR) < thr &&
          Math.abs(d[i+1] - bgG) < thr &&
          Math.abs(d[i+2] - bgB) < thr) {
        d[i+3] = 0;
      }
    }
    oc2d.putImageData(imgData, 0, 0);
  }

  lizardCanvas = oc;
  lizardLoaded = true;
};

pikachuImg.src = 'image/피카츄2.png';
let pikachuLoaded = false;
let pikachuCanvas = null;

pikachuImg.onload = () => {

const pikachuSlideImg = new Image();
pikachuSlideImg.src = 'image/피카츄_슬라이팅.png';

// ── 망나뇽 개별 스프라이트 ──
const DRAGONITE_MOTION = {
  run:   [1,2,3,4,5,6,7,8],
  fly:   [9,10,11,12,13,14,15,16],
  slide: [26,27,28,29,30,31]
};
const dragoniteFrames = {};
let dragoniteLoaded = false;
let _dragoniteLoadCount = 0;
const _dragoniteTotal = [].concat(
  DRAGONITE_MOTION.run, DRAGONITE_MOTION.fly, DRAGONITE_MOTION.slide
).length;

function _loadDragoniteSprite(n) {
  const img = new Image();
  img.src = 'image/망나뇽_스프라이트/sprite' + n + '.png';
  img.onload = () => {
    const oc = document.createElement('canvas');
    oc.width = img.naturalWidth; oc.height = img.naturalHeight;
    const oc2d = oc.getContext('2d');
    oc2d.drawImage(img, 0, 0);
    const imgData = oc2d.getImageData(0, 0, oc.width, oc.height);
    const d = imgData.data;
    if (d[3] > 0) {
      const corners = [0, (oc.width-1)*4,
        (oc.height-1)*oc.width*4,
        ((oc.height-1)*oc.width + oc.width-1)*4];
      let br=0, bg=0, bb=0;
      corners.forEach(ci => { br+=d[ci]; bg+=d[ci+1]; bb+=d[ci+2]; });
      br=Math.round(br/4); bg=Math.round(bg/4); bb=Math.round(bb/4);
      const thr = 40;
      for (let i=0; i<d.length; i+=4) {
        if (Math.abs(d[i]-br)<thr && Math.abs(d[i+1]-bg)<thr && Math.abs(d[i+2]-bb)<thr)
          d[i+3] = 0;
      }
      oc2d.putImageData(imgData, 0, 0);
    }
    dragoniteFrames[n] = oc;
    _dragoniteLoadCount++;
    if (_dragoniteLoadCount >= _dragoniteTotal) dragoniteLoaded = true;
  };
}
[].concat(DRAGONITE_MOTION.run, DRAGONITE_MOTION.fly, DRAGONITE_MOTION.slide)
  .forEach(_loadDragoniteSprite);

// ── 아이템 이미지 (배경 제거 공통 헬퍼) ──
function loadItemImg(src, cb) {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    const oc   = document.createElement('canvas');
    oc.width   = img.naturalWidth;
    oc.height  = img.naturalHeight;
    const oc2d = oc.getContext('2d');
    oc2d.drawImage(img, 0, 0);
    const imgData = oc2d.getImageData(0, 0, oc.width, oc.height);
    const d = imgData.data;
    if (d[3] > 0) {
      const bgR = d[0], bgG = d[1], bgB = d[2], thr = 40;
      for (let i = 0; i < d.length; i += 4) {
        if (Math.abs(d[i]-bgR) < thr && Math.abs(d[i+1]-bgG) < thr && Math.abs(d[i+2]-bgB) < thr)
          d[i+3] = 0;
      }
      oc2d.putImageData(imgData, 0, 0);
    }
    cb(oc);
  };
}

let jellyCanvas = null;   // 젤리곰 이미지
let starCanvas  = null;   // 별 이미지 (코인 대체)
loadItemImg('image/아이템_젤리곰.png', oc => {
  // 노란색 틴트 합성 (원본 픽셀 형태 유지, 색상만 변경)
  const oc2d = oc.getContext('2d');
  oc2d.globalCompositeOperation = 'source-atop';
  oc2d.fillStyle = 'rgba(255, 210, 0, 0.82)';
  oc2d.fillRect(0, 0, oc.width, oc.height);
  oc2d.globalCompositeOperation = 'source-over';
  jellyCanvas = oc;
});
loadItemImg('image/아이템_별.png',     oc => { starCanvas  = oc; });

// ═══════════════════════════════════════════════
// 게임 상태
// ═══════════════════════════════════════════════
let state, player, obstacles, items, lastTimestamp;
let slideKeyHeld     = false;
let damageFlashTimer = 0;
let bgOff1 = 0, bgOff2 = 0, bgOff3 = 0;  // 패럴랙스 레이어 오프셋
let selectedChar     = 'lizard';           // 'lizard' | 'pikachu'
let hoveredChar      = null;
let selectCardBounds = null;

function resetGame() {
  state = {
    mode:     'SELECT',
    score:    0,
    distance: 0,
    hp:       CONFIG.maxHP,
    coins:    0,
    elapsed:  0,                       // 경과 시간 (초)
    speed:    CONFIG.baseScrollSpeed,  // 현재 스크롤 속도
    powerup:  0,                       // 파워업 잔여 시간 (ms)
  };
  player = {
    x:         PLAYER_X,
    y:         GROUND_Y - CONFIG.playerH,
    vy:        0,
    w:         CONFIG.playerW,
    h:         CONFIG.playerH,
    onGround:  true,
    sliding:   false,
    jumpsLeft: 2,
    legPhase:  0,
    invincible: 0,   // ms countdown (무적 잔여 시간)
  };
  obstacles        = [];
  items            = [];
  lastTimestamp    = null;
  slideKeyHeld     = false;
  damageFlashTimer = 0;
  bgOff1 = bgOff2 = bgOff3 = 0;
  document.getElementById('slideBtn').classList.remove('active');
}

function startGame() { state.mode = 'PLAYING'; startBGM(); }
function gameOver()  { state.mode = 'GAMEOVER'; stopBGM(); }

// ═══════════════════════════════════════════════
// 점프 / 슬라이드
// ═══════════════════════════════════════════════
function doJump() {
  if (state.mode === 'GAMEOVER') { resetGame(); return; }
  if (state.mode === 'READY')    { startGame(); return; }
  if (state.mode !== 'PLAYING') return;
  if (player.jumpsLeft > 0) {
    const power     = player.jumpsLeft === 2 ? CONFIG.jumpPower : CONFIG.doubleJumpPower;
    player.vy       = power;
    player.onGround = false;
    player.sliding  = false;
    slideKeyHeld    = false;
    document.getElementById('slideBtn').classList.remove('active');
    player.jumpsLeft--;
  }
}

function startSlide() {
  if (state.mode !== 'PLAYING') return;
  slideKeyHeld = true;
  document.getElementById('slideBtn').classList.add('active');
}

function stopSlide() {
  slideKeyHeld = false;
  document.getElementById('slideBtn').classList.remove('active');
}

// ═══════════════════════════════════════════════
// 입력
// ═══════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
  if (e.code === 'ArrowDown')                     { e.preventDefault(); startSlide(); }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowDown') stopSlide();
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state.mode === 'SELECT') {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = CONFIG.width  / rect.width;
    const scaleY = CONFIG.height / rect.height;
    const mx = (e.touches[0].clientX - rect.left) * scaleX;
    const my = (e.touches[0].clientY - rect.top)  * scaleY;
    if (selectCardBounds) {
      for (const [id, b] of Object.entries(selectCardBounds)) {
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          selectedChar = id; state.mode = 'READY'; return;
        }
      }
    }
    return;
  }
  const rect  = canvas.getBoundingClientRect();
  const ratio = (e.touches[0].clientY - rect.top) / rect.height;
  if (ratio < 0.7) doJump(); else startSlide();
}, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); stopSlide(); }, { passive: false });
canvas.addEventListener('mousemove', (e) => {
  if (state.mode !== 'SELECT') { hoveredChar = null; return; }
  const rect   = canvas.getBoundingClientRect();
  const scaleX = CONFIG.width  / rect.width;
  const scaleY = CONFIG.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  hoveredChar = null;
  if (selectCardBounds) {
    for (const [id, b] of Object.entries(selectCardBounds)) {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        hoveredChar = id; break;
      }
    }
  }
});
canvas.addEventListener('click', (e) => {
  if (state.mode === 'SELECT') {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = CONFIG.width  / rect.width;
    const scaleY = CONFIG.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top)  * scaleY;
    if (selectCardBounds) {
      for (const [id, b] of Object.entries(selectCardBounds)) {
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          selectedChar = id; state.mode = 'READY'; return;
        }
      }
    }
    return;
  }
  doJump();
});

const slideBtn = document.getElementById('slideBtn');
slideBtn.addEventListener('mousedown',  () => startSlide());
slideBtn.addEventListener('mouseup',    () => stopSlide());
slideBtn.addEventListener('mouseleave', () => stopSlide());
slideBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSlide(); }, { passive: false });
slideBtn.addEventListener('touchend',   (e) => { e.preventDefault(); stopSlide();  }, { passive: false });

// ═══════════════════════════════════════════════
// 장애물 스폰
// ═══════════════════════════════════════════════
function airObsY() {
  return GROUND_Y - CONFIG.slideH - CONFIG.hitboxPadding * 2 - CONFIG.airObsH;
}

function pickObsType() {
  const total = CONFIG.spawnWeightGround + CONFIG.spawnWeightAir + CONFIG.spawnWeightPit;
  const r     = Math.random() * total;
  if (r < CONFIG.spawnWeightGround) return 'ground';
  if (r < CONFIG.spawnWeightGround + CONFIG.spawnWeightAir) return 'air';
  return 'pit';
}

function currentObstacleGap() {
  return Math.max(
    CONFIG.obstacleMinGap - state.elapsed * CONFIG.gapRampPerSec,
    CONFIG.minObstacleGap
  );
}

function spawnObstacles() {
  const rightEdge = obstacles.length > 0
    ? Math.max(...obstacles.map(o => o.x + o.w))
    : -Infinity;
  if (CONFIG.width - rightEdge < currentObstacleGap()) return;

  const type = pickObsType();
  if (type === 'ground') {
    obstacles.push({ type: 'ground', x: CONFIG.width,
      y: GROUND_Y - CONFIG.groundObsH, w: CONFIG.groundObsW, h: CONFIG.groundObsH });
  } else if (type === 'air') {
    obstacles.push({ type: 'air', x: CONFIG.width,
      y: airObsY(), w: CONFIG.airObsW, h: CONFIG.airObsH });
  } else {
    const pitW = CONFIG.pitMinW + Math.random() * (CONFIG.pitMaxW - CONFIG.pitMinW);
    obstacles.push({ type: 'pit', x: CONFIG.width,
      y: GROUND_Y, w: Math.floor(pitW), h: CONFIG.height - GROUND_Y });
  }
}

// ═══════════════════════════════════════════════
// 아이템 스폰 (젤리 라인 / 코인 라인)
// ═══════════════════════════════════════════════
function spawnItems() {
  const living    = items.filter(i => !i.collected);
  const rightEdge = living.length > 0
    ? Math.max(...living.map(i => i.x + i.r))
    : -Infinity;
  if (CONFIG.width - rightEdge < CONFIG.itemMinGap) return;

  // 특수 파워업 아이템 (단독 등장)
  if (Math.random() < CONFIG.powerupSpawnChance) {
    items.push({
      type: 'powerup',
      x: CONFIG.width + 20,
      y: GROUND_Y - CONFIG.powerupR - 30,
      r: CONFIG.powerupR,
      collected: false,
      bobPhase: Math.random() * Math.PI * 2,
    });
    return;
  }

  const isCoin = Math.random() < 0.22;   // 22% 확률로 코인 줄
  const isArc  = Math.random() < 0.45;   // 45% 확률로 아크 배치
  const type   = isCoin ? 'coin' : 'jelly';
  const r      = type === 'coin' ? CONFIG.coinR : CONFIG.jellyR;
  const n      = CONFIG.jellyLineCount;
  const baseY  = GROUND_Y - r;

  for (let i = 0; i < n; i++) {
    const x = CONFIG.width + i * CONFIG.jellySpacing;
    const t = i / (n - 1);
    const y = isArc
      ? baseY - CONFIG.arcPeakHeight * Math.sin(Math.PI * t)
      : baseY;
    items.push({ type, x, y, r, collected: false, bobPhase: i * 0.8 });
  }
}

// ═══════════════════════════════════════════════
// 충돌 판정
// ═══════════════════════════════════════════════
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function isOverPit(px, pw) {
  const L = px + CONFIG.hitboxPadding;
  const R = px + pw - CONFIG.hitboxPadding;
  for (const o of obstacles) {
    if (o.type === 'pit' && L < o.x + o.w && R > o.x) return true;
  }
  return false;
}

function takeDamage() {
  if (player.invincible > 0 || state.powerup > 0) return false;
  state.hp--;
  player.invincible = CONFIG.invincibleMs;
  damageFlashTimer  = CONFIG.damageFlashMs;
  if (state.hp <= 0) { gameOver(); return true; }
  return false;
}

function checkCollisions() {
  const pad = CONFIG.hitboxPadding;
  const px = player.x + pad, py = player.y + pad;
  const pw = player.w - pad * 2, ph = player.h - pad * 2;
  for (const o of obstacles) {
    if (o.type === 'pit') continue;
    if (rectsOverlap(px, py, pw, ph,
                     o.x + pad, o.y + pad,
                     o.w - pad * 2, o.h - pad * 2)) {
      takeDamage(); return;
    }
  }
}

function checkItemCollisions() {
  for (const item of items) {
    if (item.collected) continue;
    // 아이템 중심이 플레이어 바운딩 박스(+여유) 안에 있으면 획득
    if (item.x + item.r > player.x      &&
        item.x - item.r < player.x + player.w &&
        item.y + item.r > player.y      &&
        item.y - item.r < player.y + player.h) {
      item.collected = true;
      if (item.type === 'jelly')        { state.score  += CONFIG.jellyScore;        playJellySound();   }
      else if (item.type === 'powerup') { state.powerup = CONFIG.powerupDuration;   playPowerupSound(); }
      else                              { state.coins   += CONFIG.coinValue;         playCoinSound();    }
    }
  }
}

// ═══════════════════════════════════════════════
// 업데이트
// ═══════════════════════════════════════════════
function update(dt) {
  // SELECT/READY 모드에서도 배경은 천천히 스크롤
  if (state.mode !== 'PLAYING') {
    const s = dt / FRAME_MS;
    bgOff1 = (bgOff1 + CONFIG.baseScrollSpeed * s * 0.20) % 10000;
    return;
  }
  const s = dt / FRAME_MS;

  // ── 난이도 (속도·간격) 점진 상승 ──
  state.elapsed += dt / 1000;
  state.speed    = Math.min(
    CONFIG.baseScrollSpeed + state.elapsed * CONFIG.speedRampPerSec,
    CONFIG.maxScrollSpeed
  );

  // ── 패럴랙스 오프셋 ──
  const bgS = state.speed * s;
  bgOff1 = (bgOff1 + bgS * 0.20) % 10000;
  bgOff2 = (bgOff2 + bgS * 0.08) % 900;  // 구름 (느리게)
  bgOff3 = (bgOff3 + bgS * 0.55) % 760;

  // ── 타이머 ──
  if (player.invincible > 0) player.invincible = Math.max(0, player.invincible - dt);
  if (damageFlashTimer > 0)  damageFlashTimer  = Math.max(0, damageFlashTimer  - dt);
  if (state.powerup > 0)     state.powerup     = Math.max(0, state.powerup     - dt);

  // ── 슬라이드 & 높이 ──
  player.sliding = slideKeyHeld && player.onGround;
  player.h       = player.sliding ? CONFIG.slideH : CONFIG.playerH;

  const groundSurface = GROUND_Y - player.h;

  // ── 물리 (지면 위) ──
  if (player.onGround) {
    if (isOverPit(player.x, player.w)) {
      player.onGround = false;
      player.vy       = 0;
    } else {
      player.y  = groundSurface;
      player.vy = 0;
    }
  }

  // ── 물리 (공중) ──
  if (!player.onGround) {
    player.vy += CONFIG.gravity * s;
    player.y  += player.vy * s;

    // 구덩이 낙하 → HP 감소 + 리스폰
    if (player.y > GROUND_Y + 30) {
      const dead = takeDamage();
      if (dead) return;
      // 리스폰: 지면으로 복귀
      player.y        = GROUND_Y - player.h;
      player.vy       = 0;
      player.onGround = true;
      player.jumpsLeft = 2;
    } else if (player.y >= groundSurface && !isOverPit(player.x, player.w)) {
      player.y        = groundSurface;
      player.vy       = 0;
      player.onGround = true;
      player.jumpsLeft = 2;
    }
  }

  // ── 다리 애니메이션 ──
  if (player.onGround && !player.sliding) player.legPhase += s;

  // ── 장애물·아이템 이동 (파워업 중 속도 배율 적용) ──
  const effectiveSpeed = state.powerup > 0
    ? state.speed * CONFIG.powerupSpeedMult
    : state.speed;
  const speed = effectiveSpeed * s;
  for (const o of obstacles) o.x -= speed;
  for (const i of items)     i.x -= speed;

  // 화면 밖 제거
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
  }
  for (let i = items.length - 1; i >= 0; i--) {
    if (items[i].x + items[i].r < 0) items.splice(i, 1);
  }

  spawnObstacles();
  spawnItems();
  checkCollisions();
  checkItemCollisions();

  // ── 거리 기반 점수 (젤리 점수는 checkItemCollisions에서 직접 가산) ──
  if (state.mode === 'PLAYING') {
    state.distance += speed;
    state.score    += speed * CONFIG.distanceScorePerPx;
    state.score     = Math.floor(state.score);
  }
}

// ═══════════════════════════════════════════════
// 렌더
// ═══════════════════════════════════════════════
function render() {
  const W = CONFIG.width, H = CONFIG.height;

  drawBackground();
  drawGround();
  drawItems();
  for (const o of obstacles) drawObstacle(o);
  drawPlayer();

  // 파워업 화면 효과 — 황금 테두리 펄스
  if (state.powerup > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(state.elapsed * 10);
    ctx.strokeStyle = `rgba(255,180,0,${0.35 + 0.3 * pulse})`;
    ctx.lineWidth   = 10;
    ctx.strokeRect(0, 0, W, H);
    ctx.lineWidth   = 1;
  }

  // 피격 화면 플래시
  if (damageFlashTimer > 0) {
    ctx.fillStyle = `rgba(220,0,0,${0.38 * (damageFlashTimer / CONFIG.damageFlashMs)})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();

  if (state.mode === 'SELECT') {
    drawCharSelect();
  } else if (state.mode === 'READY') {
    drawOverlay('쿠키런 Phase 3', [
      '스페이스/↑ : 점프 · 더블점프   ↓ : 슬라이드',
      '빨강 가시 : 점프   보라 블록 : 슬라이드   구덩이 : 점프',
    ]);
  } else if (state.mode === 'GAMEOVER') {
    drawOverlay('GAME OVER', [
      `점수: ${state.score}   |   코인: ${state.coins}`,
      '스페이스 / 클릭으로 재시작',
    ]);
  }
}

// ─── 배경 이미지 스크롤 ───
function drawBackground() {
  const W = CONFIG.width, H = CONFIG.height;

  if (bgImgLoaded && bgTileCanvas) {
    // createPattern 대신 직접 2장 그리기 → 이음새 렌더링 아티팩트 제거
    const offset = -(bgOff1 % bgImgDrawW);
    ctx.drawImage(bgTileCanvas, offset,              0, bgImgDrawW, H);
    ctx.drawImage(bgTileCanvas, offset + bgImgDrawW, 0, bgImgDrawW, H);
    // offset이 양수가 될 경우 왼쪽 빈 공간 보완
    if (offset > 0) {
      ctx.drawImage(bgTileCanvas, offset - bgImgDrawW, 0, bgImgDrawW, H);
    }
  } else {
    // 이미지 로드 전 폴백 그라디언트
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, CONFIG.bgColor);
    sky.addColorStop(1, CONFIG.bgBottomColor);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── 지면 ───
function drawGround() {
  const W = CONFIG.width, H = CONFIG.height;
  const pits = obstacles.filter(o => o.type === 'pit');

  ctx.fillStyle = CONFIG.groundColor;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = CONFIG.grassColor;
  ctx.fillRect(0, GROUND_Y, W, CONFIG.groundThickness);

  for (const pit of pits) {
    ctx.fillStyle = CONFIG.pitColor;
    ctx.fillRect(pit.x, GROUND_Y, pit.w, H - GROUND_Y);
    ctx.fillStyle = CONFIG.pitEdgeColor;
    ctx.fillRect(pit.x,             GROUND_Y, 5, H - GROUND_Y);
    ctx.fillRect(pit.x + pit.w - 5, GROUND_Y, 5, H - GROUND_Y);
    ctx.fillStyle = CONFIG.grassColor;
    ctx.fillRect(pit.x - 3,         GROUND_Y, 5, CONFIG.groundThickness);
    ctx.fillRect(pit.x + pit.w - 2, GROUND_Y, 5, CONFIG.groundThickness);

  }
}

// ─── 별 모양 경로 헬퍼 ───
function drawStarPath(cx, cy, r, points, innerRatio) {
  const step = Math.PI / points;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = (i % 2 === 0) ? r : r * innerRatio;
    const angle  = i * step - Math.PI / 2;
    const px = cx + radius * Math.cos(angle);
    const py = cy + radius * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// ─── 아이템 (젤리/코인/파워업) ───
function drawItems() {
  for (const item of items) {
    if (item.collected) continue;
    const { x, y, r, type } = item;

    const bobY = Math.sin(state.elapsed * 3.5 + (item.bobPhase || 0)) * 8;

    if (type === 'powerup') {
      const angle = state.elapsed * 2.8;
      const pulse = 0.6 + 0.4 * Math.sin(state.elapsed * 6);
      ctx.save();
      ctx.translate(x, y + bobY);
      ctx.rotate(angle);
      // 외곽 글로우
      ctx.fillStyle = `rgba(255,220,0,${0.25 * pulse})`;
      drawStarPath(0, 0, r * 1.7, 5, 0.5);
      ctx.fill();
      // 메인 별
      ctx.fillStyle = CONFIG.powerupColor;
      drawStarPath(0, 0, r, 5, 0.42);
      ctx.fill();
      // 별 하이라이트
      ctx.fillStyle = CONFIG.powerupGlow;
      drawStarPath(0, 0, r * 0.55, 5, 0.42);
      ctx.fill();
      // 중앙 흰 점
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else if (type === 'jelly') {
      if (jellyCanvas) {
        const sz = r * 8.0;
        ctx.drawImage(jellyCanvas, x - sz / 2, y - sz / 2 + bobY, sz, sz);
      } else {
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(x, y + bobY, r, 0, Math.PI * 2); ctx.fill();
      }
    } else {
      // 코인 → 별 이미지 (회전 + 위아래)
      if (starCanvas) {
        const sz = r * 5.0;
        ctx.save();
        ctx.translate(x, y + bobY);
        ctx.rotate(state.elapsed * 1.8);
        ctx.drawImage(starCanvas, -sz / 2, -sz / 2, sz, sz);
        ctx.restore();
      } else {
        ctx.fillStyle = CONFIG.coinColor;
        ctx.beginPath(); ctx.arc(x, y + bobY, r, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
}

// ─── 바위 (ground 장애물) ───
function drawRock(o) {
  const cx = o.x + o.w / 2, by = o.y + o.h;

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx, by + 3, o.w * 0.52, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 바위 본체 (불규칙 베지어)
  ctx.fillStyle = '#787878';
  ctx.beginPath();
  ctx.moveTo(o.x + o.w * 0.12, by);
  ctx.bezierCurveTo(o.x - 2,          by - o.h * 0.3,
                    o.x + o.w * 0.1,  o.y + 4, cx, o.y - 4);
  ctx.bezierCurveTo(o.x + o.w * 0.75, o.y - 6,
                    o.x + o.w + 3,    by - o.h * 0.35, o.x + o.w * 0.88, by);
  ctx.closePath(); ctx.fill();

  // 밝은 면 (하이라이트)
  ctx.fillStyle = '#AAAAAA';
  ctx.beginPath();
  ctx.moveTo(cx - o.w*0.14, o.y + o.h*0.10);
  ctx.bezierCurveTo(cx - o.w*0.04, o.y,         cx + o.w*0.22, o.y + o.h*0.06,
                    cx + o.w*0.18, o.y + o.h*0.32);
  ctx.bezierCurveTo(cx + o.w*0.08, o.y + o.h*0.46, cx - o.w*0.20, o.y + o.h*0.42,
                    cx - o.w*0.14, o.y + o.h*0.10);
  ctx.fill();

  // 균열
  ctx.strokeStyle = '#505050'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx + o.w*0.08, o.y + o.h*0.22);
  ctx.lineTo(cx + o.w*0.04, o.y + o.h*0.52);
  ctx.lineTo(cx + o.w*0.17, o.y + o.h*0.76);
  ctx.stroke(); ctx.lineWidth = 1;
}

// ─── 벽돌 벽 (air 장애물) ───
function drawBrickWall(o) {
  const bH = 9, bW = 20, gap = 2;

  // 모르타르 배경
  ctx.fillStyle = '#6A3E20';
  ctx.fillRect(o.x, o.y, o.w, o.h);

  // 벽돌 (클립으로 경계 처리)
  ctx.save();
  ctx.beginPath(); ctx.rect(o.x, o.y, o.w, o.h); ctx.clip();
  const rows = Math.ceil(o.h / (bH + gap)) + 1;
  for (let row = 0; row < rows; row++) {
    const by  = o.y + row * (bH + gap);
    const shift = (row % 2) * ((bW + gap) / 2);
    for (let col = -1; col <= Math.ceil(o.w / (bW + gap)) + 1; col++) {
      const bx = o.x + col * (bW + gap) - shift;
      ctx.fillStyle = (col + row) % 2 === 0 ? '#C4682A' : '#B05A1E';
      ctx.fillRect(bx, by, bW, bH);
      ctx.fillStyle = 'rgba(255,200,140,0.13)';
      ctx.fillRect(bx, by, bW, 2);
    }
  }
  ctx.restore();

  // 테두리
  ctx.strokeStyle = '#3A1808'; ctx.lineWidth = 1.5;
  ctx.strokeRect(o.x, o.y, o.w, o.h); ctx.lineWidth = 1;

  // 하단 매달린 덩굴
  ctx.strokeStyle = '#2A6820'; ctx.lineWidth = 2;
  const vCount = Math.floor(o.w / 14);
  for (let v = 0; v < vCount; v++) {
    const vx  = o.x + 8 + v * 14;
    const vLen = 7 + (v % 3) * 4;
    ctx.beginPath();
    ctx.moveTo(vx, o.y + o.h);
    ctx.quadraticCurveTo(vx + 3, o.y + o.h + vLen * 0.5, vx - 2, o.y + o.h + vLen);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
}

// ─── 식충식물 (pit 가장자리) ───
function drawPlant(px, t) {
  const openAmt = 0.22 + 0.18 * Math.sin(t * 2.5);
  const gap     = openAmt * 13;

  ctx.save();
  // 줄기
  ctx.strokeStyle = '#6B3A1F'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(px, GROUND_Y + 2);
  ctx.quadraticCurveTo(px - 10, GROUND_Y - 18, px + 3, GROUND_Y - 42);
  ctx.stroke(); ctx.lineWidth = 1; ctx.lineCap = 'butt';

  ctx.translate(px + 3, GROUND_Y - 46);

  // 위 아래 턱
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.ellipse(0,  gap, 18, 10, 0, 0,       Math.PI); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -gap, 18, 10, 0, Math.PI, 0);       ctx.fill();

  // 내부 (살)
  ctx.fillStyle = '#C0392B';
  ctx.beginPath(); ctx.ellipse(0, 0, 14, gap + 3, 0, 0, Math.PI * 2); ctx.fill();

  // 이빨
  ctx.fillStyle = '#F5E6D0';
  for (let i = -2; i <= 2; i++) {
    const tx = i * 6.5;
    ctx.beginPath(); ctx.moveTo(tx-2, -gap+1); ctx.lineTo(tx, -gap-7); ctx.lineTo(tx+2, -gap+1); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx-2,  gap-1); ctx.lineTo(tx,  gap+7); ctx.lineTo(tx+2,  gap-1); ctx.fill();
  }

  // 혀
  ctx.fillStyle = '#922B21';
  ctx.beginPath(); ctx.ellipse(0, 2, 4, 2, 0, 0, Math.PI*2); ctx.fill();

  // 잎 반점
  ctx.fillStyle = '#4A2510';
  [[-12,-6],[0,-8],[12,-5],[-8,8],[8,7]].forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(dx, dy, 2, 0, Math.PI*2); ctx.fill();
  });

  ctx.restore();
}

// ─── 장애물 디스패치 ───
function drawObstacle(o) {
  if (o.type === 'ground') drawPlant(o.x + o.w / 2 - 8, state.elapsed);
  else if (o.type === 'air') drawBrickWall(o);
  // pit은 drawGround에서 처리
}

// ─── 캐릭터 ───
function drawPlayer() {
  // 무적 중 깜박임
  if (player.invincible > 0 && Math.floor(player.invincible / 150) % 2 === 1) return;

  const { x, y, w, h, onGround, sliding, legPhase, jumpsLeft } = player;

  if (selectedChar === 'dragonite' && dragoniteLoaded) {
    const dw = w + 60, dh = h + 56;

    if (sliding) {
      // 슬라이딩: sprite26~31 8fps 순환
      const frames = DRAGONITE_MOTION.slide;
      const fIdx = Math.floor(state.elapsed * 8) % frames.length;
      const fc = dragoniteFrames[frames[fIdx]];
      if (fc) ctx.drawImage(fc, 0, 0, fc.width, fc.height,
        x - 30, y - 16, w + 90, h + 24);

    } else if (!onGround) {
      // 날기: sprite9~16 12fps 순환 + 날개 박동 + 속도 기울기
      const frames = DRAGONITE_MOTION.fly;
      const fIdx = Math.floor(state.elapsed * 12) % frames.length;
      const fc = dragoniteFrames[frames[fIdx]];
      if (fc) {
        const wingBeat = 1 + Math.abs(Math.sin(state.elapsed * Math.PI * 8)) * 0.10;
        const floatY   = Math.sin(state.elapsed * 5) * 4;
        const tilt     = player.vy * 0.007;
        const cx = x - 26 + dw / 2;
        const cy = y - 40 + dh / 2 + floatY;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tilt);
        ctx.scale(wingBeat, 2 - wingBeat);
        ctx.drawImage(fc, 0, 0, fc.width, fc.height, -dw/2, -dh/2, dw, dh);
        ctx.restore();
      }

    } else {
      // 달리기: sprite1~8 12fps 순환 + 상하 바운스, 좌우 반전
      const frames = DRAGONITE_MOTION.run;
      const fIdx = Math.floor(state.elapsed * 12) % frames.length;
      const fc = dragoniteFrames[frames[fIdx]];
      const bounce = Math.sin(state.elapsed * 12) * 1.5;
      if (fc) {
        const dx = x - 26, dy = y - 40 + bounce;
        ctx.save();
        ctx.translate(dx + dw, dy);
        ctx.scale(-1, 1);
        ctx.drawImage(fc, 0, 0, fc.width, fc.height, 0, 0, dw, dh);
        ctx.restore();
      }
    }

  } else if (selectedChar === 'pikachu' && pikachuLoaded && pikachuCanvas) {
    // ── 피카츄: 5열 × 3행 스프라이트 시트 ──
    // 상황별 [행, 열] 프레임 지정
    // 피카츄 5×3 그리드
    // 달리기: 0행 0~3열 순환   점프: 1행 3↔4열 교대   슬라이딩: 2행 3↔4열 교대
    const COLS = 5, ROWS = 3;
    const fw = Math.floor(pikachuCanvas.width  / COLS);
    const fh = Math.floor(pikachuCanvas.height / ROWS);
    const dw = w + 66, dh = h + 28;

    if (sliding) {
      // 슬라이딩: 전용 이미지 사용
      if (pikachuSlideCanvas) {
        const aspect = pikachuSlideCanvas.width / pikachuSlideCanvas.height;
        const sw = w + 56;                     // 달리기와 동일한 너비
        const sh = Math.floor(sw / aspect);
        ctx.drawImage(pikachuSlideCanvas, 0, 0,
          pikachuSlideCanvas.width, pikachuSlideCanvas.height,
          x - 26, y + h - sh + 10, sw, sh);
      } else {
        // 폴백: 스프라이트 시트 2행 4열
        ctx.drawImage(pikachuCanvas, 4 * fw, 2 * fh, fw, fh,
          x - 30, y - 16, dw, dh);
      }

    } else if (!onGround) {
      // 점프 애니메이션: 1행 3열 ↔ 4열 (8fps 교대)
      const jIdx = Math.floor(state.elapsed * 8) % 2;
      const jCol = jIdx === 0 ? 4 : 3;
      const sx = jCol * fw, sy = fh;
      const bounce = (onGround && !sliding) ? Math.sin(legPhase * 0.9) * 1.5 : 0;
      ctx.drawImage(pikachuCanvas, sx, sy, fw, fh,
        x - 26, y - 40 + bounce, w + 56, h + 52);

    } else {
      // 달리기 애니메이션: 0행 0→1→2→3열 순환 (legPhase 기반)
      const rCol = Math.floor(legPhase / 5) % 4;
      const sx   = rCol * fw, sy = 0;
      const bounce = Math.sin(legPhase * 0.9) * 1.5;
      ctx.drawImage(pikachuCanvas, sx, sy, fw, fh,
        x - 26, y - 40 + bounce, w + 56, h + 52);
    }

  } else if (lizardLoaded && lizardCanvas) {
    // ── 도마뱀: 3열 × 1행 스프라이트 시트 — [0]달리기 [1]점프 [2]슬라이드 ──
    const fw   = Math.floor(lizardCanvas.width / 3);
    const fh   = lizardCanvas.height;
    const srcH = Math.floor(fh * 0.80);
    const dw = w + 56, dh = h + 52;

    if (sliding) {
      // 슬라이딩: 정적 포즈
      ctx.drawImage(lizardCanvas, fw * 2, 0, fw, srcH,
        x - 30, y - 16, w + 66, h + 28);

    } else if (!onGround) {
      // 점프 애니메이션: 상승 시 앞으로 기울고 하강 시 뒤로 기움 + 살짝 확대
      const tilt  = player.vy * 0.009;   // vy < 0 → 앞으로, vy > 0 → 뒤로
      const scale = 1.06;
      const cx = x - 26 + dw / 2;
      const cy = y - 40 + dh / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(tilt);
      ctx.scale(scale, scale);
      ctx.drawImage(lizardCanvas, fw, 0, fw, srcH, -dw / 2, -dh / 2, dw, dh);
      ctx.restore();

    } else {
      // 달리기 애니메이션: 몸 좌우 흔들림(tilt) + 스쿼시&스트레치 + 상하 바운스
      const phase  = legPhase * 0.9;
      const tilt   = Math.sin(legPhase * 0.45) * 0.09;  // ±5° 몸 흔들기
      const scaleX = 1 + Math.cos(phase) * 0.028;       // 가로 스케일
      const scaleY = 1 - Math.cos(phase) * 0.028;       // 세로 반대 (스쿼시)
      const bobY   = Math.sin(phase) * 2.2;             // 상하 1.5px 바운스
      const cx = x - 26 + dw / 2;
      const cy = y - 40 + dh / 2 + bobY;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(tilt);
      ctx.scale(scaleX, scaleY);
      ctx.drawImage(lizardCanvas, 0, 0, fw, srcH, -dw / 2, -dh / 2, dw, dh);
      ctx.restore();
    }
  } else {
    // 이미지 로드 전 폴백 (원래 도형)
    if (sliding) {
      ctx.fillStyle = CONFIG.playerSlideColor;
      ctx.fillRect(x - 6, y, w + 12, h);
      ctx.fillStyle = CONFIG.white;
      ctx.fillRect(x + w - 8, y + 3, 8, 8);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + w - 7, y + 4, 5, 5);
    } else {
      const swing = onGround ? Math.sin(legPhase * 0.45) * 5 : 0;
      ctx.fillStyle = CONFIG.playerLegColor;
      ctx.fillRect(x + 5,      y + h, 11, 8 + swing);
      ctx.fillRect(x + w - 16, y + h, 11, 8 - swing);
      ctx.fillStyle = CONFIG.playerColor;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = CONFIG.white;
      ctx.fillRect(x + w - 14, y + 10, 9, 9);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + w - 12, y + 12, 5, 5);
    }
  }

  // 더블점프 인디케이터
  if (!onGround) {
    for (let i = 0; i < 2; i++) {
      ctx.fillStyle = i < jumpsLeft ? CONFIG.gold : 'rgba(255,255,255,0.28)';
      ctx.beginPath();
      ctx.arc(x + w/2 - 7 + i * 14, y - 11, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ─── HUD ───
function drawHUD() {
  // HP 하트 (♥)
  ctx.font = '22px sans-serif';
  for (let i = 0; i < CONFIG.maxHP; i++) {
    ctx.fillStyle = i < state.hp ? CONFIG.hpColor : CONFIG.hpEmptyColor;
    ctx.fillText('♥', 10 + i * 26, 28);
  }

  // 코인
  ctx.fillStyle = CONFIG.coinColor;
  ctx.font      = 'bold 17px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`🪙 ${state.coins}`, CONFIG.width / 2, 26);

  // 점수
  ctx.fillStyle = CONFIG.hudColor;
  ctx.font      = 'bold 20px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`⭐ ${state.score}`, CONFIG.width - 14, 28);

  // 속도 레벨 (우하단, 작게)
  const level = Math.floor((state.speed - CONFIG.baseScrollSpeed) / CONFIG.speedRampPerSec / 10) + 1;
  ctx.fillStyle = 'rgba(30,30,80,0.55)';
  ctx.font      = '12px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`Lv.${level}  ${state.speed.toFixed(1)}x`, CONFIG.width - 8, CONFIG.height - 6);

  // 파워업 타이머 바 (중앙 상단)
  if (state.powerup > 0) {
    const ratio = state.powerup / CONFIG.powerupDuration;
    const barW  = 140;
    const barX  = CONFIG.width / 2 - barW / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(barX - 1, 38, barW + 2, 10);
    ctx.fillStyle = CONFIG.powerupHudColor;
    ctx.fillRect(barX, 39, Math.floor(barW * ratio), 8);
    ctx.fillStyle = CONFIG.powerupGlow;
    ctx.font      = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚡ POWER UP!', CONFIG.width / 2, 37);
  }

  ctx.textAlign = 'left';
}

// ─── 둥근 사각형 경로 헬퍼 ───
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y,         x + r, y);
  ctx.closePath();
}

// ─── 캐릭터 선택 화면 ───
function drawCharSelect() {
  const W = CONFIG.width, H = CONFIG.height;

  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = CONFIG.white;
  ctx.font      = 'bold 38px sans-serif';
  ctx.fillText('캐릭터 선택', W / 2, 68);

  ctx.fillStyle = CONFIG.yellow;
  ctx.font      = '15px sans-serif';
  ctx.fillText('원하는 캐릭터를 클릭하세요', W / 2, H - 28);

  const cardW = 155, cardH = 215;
  const gap   = 22;
  const totalW = cardW * 3 + gap * 2;
  const startX = W / 2 - totalW / 2;
  const cardY  = H / 2 - cardH / 2 + 14;

  selectCardBounds = {};
  drawCharCard('lizard',    startX,                        cardY, cardW, cardH);
  drawCharCard('pikachu',   startX + (cardW + gap),        cardY, cardW, cardH);
  drawCharCard('dragonite', startX + (cardW + gap) * 2,    cardY, cardW, cardH);

  ctx.textAlign = 'left';
}

function drawCharCard(charId, cx, cy, cw, ch) {
  selectCardBounds[charId] = { x: cx, y: cy, w: cw, h: ch };

  const isSel = selectedChar === charId;
  const isHov = hoveredChar  === charId;

  // 카드 배경
  ctx.fillStyle = isSel ? 'rgba(255,200,0,0.28)' : isHov ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.10)';
  roundRectPath(cx, cy, cw, ch, 14); ctx.fill();

  // 카드 테두리
  ctx.strokeStyle = isSel ? '#FFD700' : isHov ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.30)';
  ctx.lineWidth   = isSel ? 3 : 2;
  roundRectPath(cx, cy, cw, ch, 14); ctx.stroke();
  ctx.lineWidth = 1;

  // 캐릭터 프리뷰
  const previewH = ch - 92;
  const previewY = cy + 14;
  const sprCanvas = charId === 'lizard' ? lizardCanvas
                  : charId === 'pikachu' ? pikachuCanvas
                  : (dragoniteLoaded ? dragoniteFrames[1] : null);
  const sprLoaded = charId === 'lizard' ? lizardLoaded
                  : charId === 'pikachu' ? pikachuLoaded : dragoniteLoaded;

  if (sprLoaded && sprCanvas) {
    let fw, fh, sx, sy;
    if (charId === 'pikachu') {
      fw = Math.floor(sprCanvas.width  / 5);
      fh = Math.floor(sprCanvas.height / 3);
      sx = fw; sy = 0;
    } else if (charId === 'dragonite') {
      // 개별 프레임 — sprite1 달리기 포즈 미리보기
      fw = sprCanvas.width;
      fh = sprCanvas.height;
      sx = 0; sy = 0;
    } else {
      // 도마뱀: 3×1 — col=0 달리기 포즈
      fw = Math.floor(sprCanvas.width / 3);
      fh = Math.floor(sprCanvas.height * 0.80);
      sx = 0; sy = 0;
    }
    const scale = previewH / fh;
    const dispW = Math.floor(fw * scale);
    ctx.drawImage(sprCanvas, sx, sy, fw, fh,
      cx + cw / 2 - dispW / 2, previewY, dispW, previewH);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(cx + cw/2 - 28, previewY + previewH/2 - 28, 56, 56);
    ctx.fillStyle = CONFIG.white;
    ctx.font      = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('로딩 중...', cx + cw/2, previewY + previewH/2 + 8);
  }

  // 이름
  const label = charId === 'lizard' ? '🦎 도마뱀'
              : charId === 'pikachu' ? '⚡ 피카츄' : '🐉 망나뇽';
  ctx.textAlign = 'center';
  ctx.fillStyle = isSel ? CONFIG.gold : CONFIG.white;
  ctx.font      = 'bold 20px sans-serif';
  ctx.fillText(label, cx + cw / 2, cy + ch - 48);

  // 상태 텍스트
  ctx.font = isSel ? 'bold 14px sans-serif' : '13px sans-serif';
  ctx.fillStyle = isSel ? CONFIG.gold : 'rgba(255,255,255,0.6)';
  ctx.fillText(isSel ? '✓ 선택됨' : '클릭하여 선택', cx + cw / 2, cy + ch - 22);
}

// ─── 오버레이 ───
function drawOverlay(title, lines) {
  const W = CONFIG.width, H = CONFIG.height;
  ctx.fillStyle = CONFIG.overlayBg;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = CONFIG.white;
  ctx.font      = 'bold 44px sans-serif';
  ctx.fillText(title, W / 2, H / 2 - 28);

  ctx.fillStyle = CONFIG.yellow;
  ctx.font      = '16px sans-serif';
  lines.forEach((line, i) => ctx.fillText(line, W / 2, H / 2 + 16 + i * 26));

  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════
// 게임 루프
// ═══════════════════════════════════════════════
function loop(timestamp) {
  if (lastTimestamp === null) lastTimestamp = timestamp;
  const dt      = Math.min(timestamp - lastTimestamp, 50);
  lastTimestamp = timestamp;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

resetGame();
requestAnimationFrame(loop);
</script>
